<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mustafa Bozkaya — AI/ML Project Portfolio</title>
    <meta name="description" content="AI, Machine Learning, Data Science, and Data Engineering project portfolio by Mustafa Bozkaya" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>" />

    <!-- Fonts: Space Grotesk (headings) + Inter (body) + JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/SplitText.min.js" defer></script>

    <style>
        /* ─── Reset & Base ─── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a1a;
            --bg-alt: #0f0f2a;
            --surface: rgba(30, 30, 60, 0.6);
            --surface-hover: rgba(40, 40, 80, 0.8);
            --border: rgba(100, 100, 180, 0.15);
            --border-hover: rgba(100, 180, 255, 0.3);
            --text: #f1f5f9;
            --text-muted: #8899bb;
            --accent: #38bdf8;
            --accent2: #a78bfa;
            --accent3: #34d399;
            --green: #34d399;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0,0,0,.5);
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── Three.js Canvas Background ─── */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        /* ─── Scanline Overlay ─── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.015) 2px,
                rgba(255,255,255,0.015) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        /* ─── Gradient Background ─── */
        .bg-glow {
            position: fixed;
            top: -50%;
            left: -25%;
            width: 150%;
            height: 150%;
            background:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(56, 189, 248, 0.06), transparent),
                radial-gradient(ellipse 500px 500px at 80% 70%, rgba(167, 139, 250, 0.05), transparent),
                radial-gradient(ellipse 300px 300px at 50% 50%, rgba(52, 211, 153, 0.03), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Main Content Wrapper ─── */
        .content {
            position: relative;
            z-index: 2;
        }

        /* ─── Header / Hero ─── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 6rem 1.5rem 4rem;
            position: relative;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 0.4rem 1.2rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .hero-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent3);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--accent3); }
            50% { opacity: 0.5; box-shadow: 0 0 12px var(--accent3); }
        }

        .hero h1 {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .hero h1 .gradient-text {
            background: linear-gradient(135deg, var(--accent), var(--accent2), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero h1 .gradient-text-alt {
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-muted);
            max-width: 600px;
            opacity: 0;
            transform: translateY(20px);
        }

        .hero-subtitle .highlight {
            color: var(--accent);
            font-weight: 500;
        }

        .hero-cta {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 2rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .hero-cta a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.6rem;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-family: var(--font-body);
        }

        .hero-cta .btn-primary {
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: #0a0a1a;
            border: none;
        }

        .hero-cta .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(56, 189, 248, 0.3);
        }

        .hero-cta .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .hero-cta .btn-outline:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
            transform: translateY(-2px);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0;
        }

        .scroll-indicator .mouse {
            width: 24px;
            height: 38px;
            border: 2px solid var(--text-muted);
            border-radius: 12px;
            position: relative;
        }

        .scroll-indicator .mouse::after {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 8px;
            background: var(--accent);
            border-radius: 2px;
            animation: scroll-wheel 2s ease-in-out infinite;
        }

        @keyframes scroll-wheel {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 1; }
            50% { transform: translateX(-50%) translateY(8px); opacity: 0.3; }
        }

        /* ─── Stats Bar ─── */
        .stats-section {
            padding: 2rem 1rem;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 2;
        }

        .stats {
            display: flex;
            gap: 3rem;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .stats .stat {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
        }

        .stats .stat .num {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats .stat .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
        }

        /* ─── Filters ─── */
        .filters-wrap {
            position: sticky;
            top: 0;
            z-index: 20;
            padding: 1rem 1rem;
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .filters {
            display: flex;
            gap: 0.4rem;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }

        .filters button {
            font-family: var(--font-body);
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .filters button:hover {
            border-color: var(--accent);
            color: var(--text);
            background: rgba(56, 189, 248, 0.08);
        }

        .filters button.active {
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: #0a0a1a;
            border-color: transparent;
            font-weight: 600;
        }

        /* ─── Project Grid ─── */
        .grid-section {
            padding: 2rem 1.5rem 4rem;
            max-width: 1280px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: var(--radius);
            padding: 1px;
            background: linear-gradient(135deg, transparent, transparent, transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: opacity 0.4s ease;
            opacity: 0;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: var(--border-hover);
            box-shadow: 0 12px 48px rgba(56, 189, 248, 0.08), 0 4px 16px rgba(0,0,0,.4);
        }

        .card:hover::before { opacity: 1; }

        .card:hover::after {
            opacity: 1;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(167, 139, 250, 0.1), transparent);
        }

        .card .tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.25rem 0.7rem;
            border-radius: 6px;
            margin-bottom: 0.75rem;
            width: fit-content;
        }

        .card h3 {
            font-family: var(--font-heading);
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.6;
            flex: 1;
        }

        .card .tech {
            display: flex;
            gap: 0.35rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .card .tech span {
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            font-size: 0.73rem;
            padding: 0.15rem 0.6rem;
            border-radius: 4px;
            font-weight: 500;
            font-family: var(--font-mono);
        }

        .card .footer-link {
            margin-top: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: gap 0.3s ease;
        }

        .card .footer-link:hover { gap: 0.7rem; text-decoration: underline; }

        /* ─── Tag Colors ─── */
        .tag-ai { background: rgba(139, 92, 246, 0.25); color: #c4b5fd; }
        .tag-ml { background: rgba(59, 130, 246, 0.25); color: #93c5fd; }
        .tag-ds { background: rgba(16, 185, 129, 0.25); color: #6ee7b7; }
        .tag-web { background: rgba(245, 158, 11, 0.25); color: #fcd34d; }
        .tag-de { background: rgba(6, 182, 212, 0.25); color: #67e8f9; }
        .tag-cv { background: rgba(239, 68, 68, 0.25); color: #fca5a5; }
        .tag-da { background: rgba(236, 72, 153, 0.25); color: #f9a8d4; }
        .tag-auto { background: rgba(20, 184, 166, 0.25); color: #5eead4; }

        /* ─── Modal ─── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,.6);
            position: relative;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .modal-overlay.open .modal {
            transform: scale(1);
            opacity: 1;
        }

        .modal .close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal .close:hover { color: var(--text); }

        .modal h2 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .modal .badge { margin-bottom: 1rem; }

        .modal p { color: var(--text-muted); margin-bottom: 1rem; line-height: 1.7; }

        .modal .tech-strip {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .modal .tech-strip span {
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 0.2rem 0.7rem;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .modal a.button {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: #0a0a1a;
            font-weight: 700;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .modal a.button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(56, 189, 248, 0.3);
        }

        /* ─── Footer ─── */
        footer {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 2;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .hero { min-height: 80vh; padding: 5rem 1.25rem 3rem; }
            .hero h1 { font-size: clamp(2rem, 8vw, 3rem); }
            .grid { grid-template-columns: 1fr; }
            .stats { gap: 1.5rem; }
            .filters { gap: 0.3rem; }
            .filters button { font-size: 0.78rem; padding: 0.3rem 0.8rem; }
            .card { padding: 1.2rem; }
        }

        @media (max-width: 480px) {
            .hero { min-height: 70vh; padding: 4rem 1rem 2rem; }
            .hero-cta a { font-size: 0.85rem; padding: 0.6rem 1.2rem; }
            .grid-section { padding: 1.5rem 1rem 3rem; }
        }

        /* ─── Reduced Motion ─── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            #particle-canvas { display: none; }
        }
    </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<div class="bg-glow"></div>

<!-- ═══ Content ═══ -->
<div class="content">

<!-- ═══ Hero ═══ -->
<section class="hero">
    <div class="hero-badge" id="hero-badge">

    <h1 id="hero-title">

    <div class="hero-cta" id="hero-cta">

        <div class="stat"><div class="num" id="project-count">0</div><div class="label">Projects</div></div>

// ─── Build UI ───
const categories = [...new Set(projects.map(p => p.category))];
const tags = [...new Set(projects.map(p => p.tag))];
const allTech = [...new Set(projects.flatMap(p => p.tech))];

document.getElementById('project-count').textContent = projects.length;
document.getElementById('category-count').textContent = categories.length;
document.getElementById('tech-count').textContent = allTech.length;

const filterContainer = document.getElementById('filters');
tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.textContent = tag;
    btn.dataset.filter = tag;
    btn.onclick = () => filterProjects(tag);
    filterContainer.appendChild(btn);
});

categories.forEach(cat => {
    const btn = document.createElement('button');
    const label = { ai: 'Agentic AI', ml: 'ML/DL', data: 'Data Engineering', cv: 'CV/Robotics' }[cat] || cat;
    btn.textContent = label;
    btn.dataset.filter = cat;
    btn.onclick = () => filterProjects(cat);
    filterContainer.appendChild(btn);
});

let currentFilter = 'all';

function filterProjects(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filters button').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === filter);
        if (filter === 'all' && b.dataset.filter === 'all') b.classList.add('active');
    });

    const filtered = filter === 'all'
        ? projects
        : projects.filter(p => p.category === filter || p.tag === filter);

    // Animate out, then in
    const grid = document.getElementById('grid');
    const cards = grid.querySelectorAll('.card');
    if (cards.length) {
        gsap.to(cards, {
            opacity: 0,
            y: 20,
            scale: 0.95,
            duration: 0.25,
            stagger: 0.02,
            ease: 'power2.in',
            onComplete: () => {
                renderGrid(filtered);
                animateGridItems();
            }
        });
    } else {
        renderGrid(filtered);
        animateGridItems();
    }
}

function renderGrid(items) {
    const grid = document.getElementById('grid');
    grid.innerHTML = items.map((p, i) => `
        <div class="card" onclick="openModal(${projects.indexOf(p)})" data-index="${i}">
            <span class="tag ${p.tagClass}">${p.tag}</span>
            <h3>${p.title}</h3>
            <p>${p.description}</p>
            <div class="tech">${p.tech.map(t => `<span>${t}</span>`).join('')}</div>
            <a href="${p.link}" class="footer-link" onclick="event.stopPropagation()">View Project →</a>
        </div>
    `).join('');
}

function animateGridItems() {
    const cards = document.querySelectorAll('#grid .card');
    if (!cards.length || !window.gsap) return;
    gsap.to(cards, {
        opacity: 1,
        y: 0,
        scale: 1,
        duration: 0.5,
        stagger: 0.04,
        ease: 'power3.out',
        overwrite: 'auto'
    });
}

function openModal(index) {
    const p = projects[index];
    document.getElementById('modal-content').innerHTML = `
        <span class="tag ${p.tagClass} badge">${p.tag}</span>
        <h2>${p.title}</h2>
        <p>${p.details}</p>
        <div class="tech-strip">${p.tech.map(t => `<span>${t}</span>`).join('')}</div>
        <a href="${p.link}" class="button" target="_blank">🔗 View Project →</a>
    `;
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// ─── Three.js Particle Background ───
(function initParticles() {
    const canvas = document.getElementById('particle-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouseX = 0, mouseY = 0;
    let animationId;

    const NUM_PARTICLES = 60;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function createParticles() {
        particles = [];
        for (let i = 0; i < NUM_PARTICLES; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: (Math.random() - 0.5) * 0.3,
                opacity: Math.random() * 0.5 + 0.1
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw particles
        particles.forEach(p => {
            p.x += p.speedX + (mouseX - canvas.width/2) * 0.0001;
            p.y += p.speedY + (mouseY - canvas.height/2) * 0.0001;

            // Wrap around
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(56, 189, 248, ${p.opacity})`;
            ctx.fill();
        });

        // Draw connections
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(56, 189, 248, ${(1 - dist/150) * 0.08})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }

        animationId = requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => {
        resize();
        createParticles();
    });

    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    resize();
    createParticles();
    draw();
})();

// ─── GSAP Animations ───
document.addEventListener('DOMContentLoaded', () => {
    // Wait for GSAP to load, then animate
    function checkGSAP() {
        if (typeof gsap !== 'undefined') {
            initGSAP();
        } else {
            // Fallback: just show everything
            document.querySelectorAll('.hero-badge, #hero-title, .hero-subtitle, .hero-cta, .scroll-indicator').forEach(el => {
                el.style.opacity = '1';
                el.style.transform = 'none';
            });
            const cards = document.querySelectorAll('.card');
            cards.forEach(c => { c.style.opacity = '1'; c.style.transform = 'none'; });
            const stats = document.querySelectorAll('.stat');
            stats.forEach(s => { s.style.opacity = '1'; s.style.transform = 'none'; });
        }
    }

    function initGSAP() {
        gsap.registerPlugin(ScrollTrigger);

        // Timeline: Hero Entrance
        const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

        tl.to('#hero-badge', { opacity: 1, y: 0, duration: 0.6 })
          .to('#hero-title', { opacity: 1, y: 0, duration: 0.8 }, '-=0.3')
          .to('.hero-subtitle', { opacity: 1, y: 0, duration: 0.6 }, '-=0.4')
          .to('#hero-cta', { opacity: 1, y: 0, duration: 0.5 }, '-=0.3')
          .to('#scroll-indicator', { opacity: 1, duration: 0.6 }, '-=0.2');

        // Stats animate on scroll
        gsap.to('.stat', {
            opacity: 1,
            y: 0,
            duration: 0.5,
            stagger: 0.15,
            ease: 'power2.out',
            scrollTrigger: {
                trigger: '.stats-section',
                start: 'top 85%',
                toggleActions: 'play none none reverse'
            }
        });

        // Cards animate on scroll
        gsap.to('.card', {
            opacity: 1,
            y: 0,
            duration: 0.5,
            stagger: 0.05,
            ease: 'power3.out',
            scrollTrigger: {
                trigger: '.grid',
                start: 'top 80%',
                toggleActions: 'play none none reverse'
            }
        });

        // Number counter animation on stats
        function animateCount(el, target) {
            const obj = { val: 0 };
            gsap.to(obj, {
                val: target,
                duration: 1.5,
                ease: 'power2.out',
                scrollTrigger: {
                    trigger: '.stats-section',
                    start: 'top 80%',
                    toggleActions: 'play none none reverse'
                },
                onUpdate: () => {
                    el.textContent = Math.round(obj.val);
                }
            });
        }

        animateCount(document.getElementById('project-count'), projects.length);
        animateCount(document.getElementById('category-count'), categories.length);
        animateCount(document.getElementById('tech-count'), allTech.length);
    }

    checkGSAP();
});

// Initial render
renderGrid(projects);
</script>
